# Nginx server block for dompet.nusacoin.org
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Then run: certbot --nginx -d dompet.nusacoin.org

server {
    listen 80;
    server_name dompet.nusacoin.org;

    # Redirect HTTP to HTTPS (certbot will modify this)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dompet.nusacoin.org;

    # SSL certificates (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/dompet.nusacoin.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dompet.nusacoin.org/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://dompet.nusacoin.org;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend (static files)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting at nginx level too
        limit_req zone=wallet_api burst=10 nodelay;
    }

    # Block direct access to health endpoint from outside
    location = /health {
        deny all;
    }
}
