version: "3.8"

services:
  api:
    build: ./backend
    container_name: nux-wallet-api
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3001
      - RPC_HOST=127.0.0.1
      - RPC_PORT=8282
      - RPC_USER=nux_rpc
      - RPC_PASS=${RPC_PASS}
      - CORS_ORIGIN=https://wallet.nusacoin.com
      - EXPLORER_URL=http://127.0.0.1:8332

  frontend:
    image: nginx:alpine
    container_name: nux-wallet-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wallet

networks:
  wallet:
    driver: bridge
